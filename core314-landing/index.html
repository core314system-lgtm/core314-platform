<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Primary Meta Tags -->
    <title>Core314 Technologies | Intelligent Software for Modern Business</title>
    <meta name="title" content="Core314 Technologies | Intelligent Software for Modern Business" />
    <meta name="description" content="Core314 Technologies LLC builds AI-powered software platforms that help organizations operate smarter, make faster decisions, and scale with confidence." />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://core314.com/" />
    <meta property="og:title" content="Core314 Technologies | Intelligent Software for Modern Business" />
    <meta property="og:description" content="Core314 Technologies LLC builds AI-powered software platforms that help organizations operate smarter, make faster decisions, and scale with confidence." />
    <meta property="og:image" content="https://core314.com/logo-icon.svg" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://core314.com/" />
    <meta property="twitter:title" content="Core314 Technologies | Intelligent Software for Modern Business" />
    <meta property="twitter:description" content="Core314 Technologies LLC builds AI-powered software platforms that help organizations operate smarter, make faster decisions, and scale with confidence." />
    <meta property="twitter:image" content="https://core314.com/logo-icon.svg" />
  </head>
  <body>
    <!-- Hidden form for Netlify form detection -->
    <form name="core314-contact-form" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="company" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
