name: Nightly DB Backup to Supabase Storage

on:
  schedule:
    # 07:10 UTC nightly (~just after Supabase's own daily backup window)
    - cron: '10 7 * * *'
  workflow_dispatch: # Allow manual triggering for verification

concurrency:
  group: db-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    name: Dump prod DB and upload to Supabase Storage
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL 17 client
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          pg_dump --version

      - name: Run backup
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Project URL is not a secret (the ref is public); kept inline to
          # minimise required secrets. Override via repo variable if it changes.
          SUPABASE_URL: https://psmicdfnvgwsjkhkwoub.supabase.co
          BACKUP_BUCKET: db-backups
          RETENTION_DAYS: "14"
        run: |
          chmod +x scripts/db-backup.sh
          ./scripts/db-backup.sh

      - name: Notify on failure
        if: failure()
        run: echo "::error::Nightly DB backup failed — check the logs above."
