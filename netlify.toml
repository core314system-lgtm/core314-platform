[build]
  command = "npm run build"
  publish = "dist"

# Prevent browser from caching index.html (SPA shell) so new deploys take effect immediately
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Also prevent caching on the root path (which serves index.html via SPA catch-all)
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Hashed assets can be cached forever (Vite adds content hashes)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# pdf-parse's package index runs debug code at load; keep it external so the
# lib subpath import resolves against node_modules at runtime.
[functions."analyze-quote"]
  external_node_modules = ["pdf-parse"]

# Scheduled function: trial expiration reminder (daily at 9am ET / 1pm UTC)
[functions."trial-reminder"]
  schedule = "0 13 * * *"

# Scheduled function: beta program reminders (daily at 9am ET / 1pm UTC)
[functions."beta-reminders"]
  schedule = "0 13 * * *"

# Scheduled function: AI agent cron (daily at 6am UTC — runs compliance + opportunity checks)
[functions."agent-cron"]
  schedule = "0 6 * * *"

# Scheduled function: weekly executive digest (Monday 8am ET / 12pm UTC — Enterprise only)
[functions."weekly-digest"]
  schedule = "0 12 * * 1"

# Scheduled function: deadline alerts (daily at 7am ET / 11am UTC — notify upcoming deadlines)
[functions."deadline-alerts"]
  schedule = "0 11 * * *"

# Scheduled function: subcontractor verification expiry check (daily at 5am UTC)
[functions."sub-expiration-check"]
  schedule = "0 5 * * *"

# Scheduled function: database hygiene (Sundays at 3am UTC — cleanup stale data)
[functions."database-hygiene"]
  schedule = "0 3 * * 0"

# Scheduled function: RFQ follow-up reminders (daily at 10am ET / 2pm UTC)
[functions."rfq-followup"]
  schedule = "0 14 * * *"

# API routes for Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Beta application routes (public, no auth)
[[redirects]]
  from = "/beta"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/beta/*"
  to = "/index.html"
  status = 200

# Portal route (public, no auth)
[[redirects]]
  from = "/portal/*"
  to = "/index.html"
  status = 200

# Presentation static files (serve as-is, not SPA)
[[redirects]]
  from = "/presentation"
  to = "/presentation/index.html"
  status = 200

[[redirects]]
  from = "/presentation/*"
  to = "/presentation/:splat"
  status = 200

# SPA catch-all (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
