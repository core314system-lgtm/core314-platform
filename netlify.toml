[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Scheduled function: trial expiration reminder (daily at 9am ET / 1pm UTC)
[functions."trial-reminder"]
  schedule = "0 13 * * *"

# Scheduled function: beta program reminders (daily at 9am ET / 1pm UTC)
[functions."beta-reminders"]
  schedule = "0 13 * * *"

# Scheduled function: AI agent cron (daily at 6am UTC — runs compliance + opportunity checks)
[functions."agent-cron"]
  schedule = "0 6 * * *"

# API routes for Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Beta application routes (public, no auth)
[[redirects]]
  from = "/beta/*"
  to = "/index.html"
  status = 200

# Portal route (public, no auth)
[[redirects]]
  from = "/portal/*"
  to = "/index.html"
  status = 200

# Presentation static files (serve as-is, not SPA)
[[redirects]]
  from = "/presentation"
  to = "/presentation/index.html"
  status = 200

[[redirects]]
  from = "/presentation/*"
  to = "/presentation/:splat"
  status = 200

# SPA catch-all (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
